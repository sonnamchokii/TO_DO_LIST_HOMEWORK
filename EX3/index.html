<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Info</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f0f0f0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            text-align: center;
            min-width: 350px;
        }
        select {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .flag {
            width: 150px;
            margin: 20px 0;
        }
        .country-name {
            font-size: 32px;
            font-weight: bold;
            margin: 10px 0;
        }
        .info {
            font-size: 18px;
            margin: 5px 0;
            color: #555;
        }
        .label {
            font-weight: bold;
            color: #333;
        }
        .loading {
            color: #888;
            font-style: italic;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Stretch goal: dropdown -->
        <select id="countrySelect">
            <option value="bhutan">Bhutan</option>
            <option value="japan">Japan</option>
            <option value="brazil">Brazil</option>
        </select>

        <div id="content">
            <p class="loading">Loading…</p>
        </div>
    </div>

    <script>
        const contentDiv = document.getElementById("content");
        const countrySelect = document.getElementById("countrySelect");

        async function fetchCountry(countryName) {
            // Show loading while fetching
            contentDiv.innerHTML = '<p class="loading">Loading…</p>';

            try {
                const response = await fetch(`https://restcountries.com/v3.1/name/${countryName}`);

                if (!response.ok) {
                    throw new Error("Country not found");
                }

                const data = await response.json();
                
                // API returns an array, take the first result
                const country = data[0];

                // Build the HTML with country info
                contentDiv.innerHTML = `
                    <img class="flag" src="${country.flags.png}" alt="Flag of ${country.name.common}">
                    <div class="country-name">${country.name.common}</div>
                    <p class="info"><span class="label">Capital:</span> ${country.capital ? country.capital[0] : "N/A"}</p>
                    <p class="info"><span class="label">Population:</span> ${country.population.toLocaleString()}</p>
                    <p class="info"><span class="label">Region:</span> ${country.region}</p>
                    <p class="info"><span class="label">Subregion:</span> ${country.subregion || "N/A"}</p>
                `;

            } catch (error) {
                contentDiv.innerHTML = '<p class="error">Failed to load country data. Try again.</p>';
                console.error(error);
            }
        }

        // Fetch Bhutan on page load
        fetchCountry("bhutan");

        // Stretch: refetch when dropdown changes
        countrySelect.addEventListener("change", function() {
            fetchCountry(this.value);
        });
    </script>

</body>
</html>
