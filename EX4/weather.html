<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gelephu Weather</title>
</head>
<body>

    <h1 id="temp">Loading…</h1>

    <script>
        async function fetchWeather() {
            try {
                const response = await fetch(
                    "https://api.open-meteo.com/v1/forecast?latitude=26.87&longitude=90.49&current_weather=true"
                );

                if (!response.ok) {
                    throw new Error("Failed to fetch weather");
                }

                const data = await response.json();
                const temperature = data.current_weather.temperature;
                document.getElementById("temp").textContent = `Gelephu: ${temperature}°C`;

            } catch (error) {
                document.getElementById("temp").textContent = "Failed to load weather";
                console.error(error);
            }
        }

        fetchWeather();
    </script>

</body>
</html>
